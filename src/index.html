<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Визуализация графа</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { 
            background: #1a1a2e; 
            color: #cdd6f4; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .controls {
            background: rgba(24, 24, 37, 0.95);
            padding: 15px;
            border-bottom: 2px solid #313244;
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        
        .control-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        button {
            padding: 10px 20px;
            font-size: 13px;
            background: #89b4fa;
            color: #1e1e2e;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            white-space: nowrap;
        }
        
        button:hover {
            background: #74c7ec;
            transform: translateY(-1px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button.danger {
            background: #f38ba8;
        }
        
        button.success {
            background: #a6e3a1;
        }
        
        button.warning {
            background: #f9e2af;
        }
        
        input[type="number"] {
            width: 70px;
            padding: 8px;
            background: #313244;
            border: 1px solid #45475a;
            border-radius: 4px;
            color: #cdd6f4;
            font-size: 13px;
        }
        
        label {
            font-size: 13px;
            color: #a6adc8;
        }
        
        .algorithm-result {
            margin-top: 10px;
            padding: 10px;
            background: #313244;
            border-radius: 6px;
            font-size: 13px;
            max-height: 100px;
            overflow-y: auto;
        }

        #canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            cursor: grab;
        }

        #canvas-container.grabbing {
            cursor: grabbing;
        }

        #canvas-container.crosshair {
            cursor: crosshair;
        }

        #canvas-container.pointer {
            cursor: pointer;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: #313244;
            padding: 30px;
            border-radius: 12px;
            min-width: 400px;
        }
        
        .modal-content h3 {
            margin-bottom: 20px;
            color: #89b4fa;
        }
        
        .modal-content textarea {
            width: 100%;
            height: 200px;
            background: #45475a;
            color: #cdd6f4;
            border: 1px solid #585b70;
            border-radius: 6px;
            padding: 10px;
            font-family: 'Courier New', monospace;
            margin-bottom: 15px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        #minimap {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        #minimap canvas {
            width: 100%;
            height: 100%;
        }

        #coordinates {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            color: #cdd6f4;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="controls">
        <div class="control-row">
            <button onclick="showManualInput()">Ввести граф вручную</button>
            <button class="success" onclick="loadFromFile()">Загрузить из файла</button>
            <button class="danger" onclick="clearGraph()">Очистить</button>
        </div>
        
        <div class="control-row">
            <label>Алгоритмы:</label>
            <label>BFS от:</label>
            <input type="number" id="bfsStart" value="0" min="0">
            <button onclick="runBFS()">Запустить BFS</button>
            
            <label>DFS от:</label>
            <input type="number" id="dfsStart" value="0" min="0">
            <button onclick="runDFS()">Запустить DFS</button>
            
            <label>Путь от:</label>
            <input type="number" id="pathStart" value="0" min="0">
            <label>до:</label>
            <input type="number" id="pathEnd" value="1" min="0">
            <button class="warning" onclick="findPath()">Кратчайший путь</button>
            
            <button onclick="checkConnectivity()">Проверить связность</button>
        </div>
        
        <div id="algorithmResult" class="algorithm-result" style="display: none;"></div>
        <div id="status" style="margin-top: 5px; font-size: 13px;"></div>
    </div>
    
    <div id="canvas-container">
        <canvas id="graphCanvas"></canvas>
    </div>
    
    <div id="minimap">
        <canvas id="minimapCanvas"></canvas>
    </div>
    
    <div id="coordinates">X: 0, Y: 0 | Масштаб: 100%</div>
    
    <div id="inputModal" class="modal">
        <div class="modal-content">
            <h3>Введите матрицу смежности</h3>
            <p style="margin-bottom: 10px; color: #a6adc8;">
                Пример квадратной матрицы:<br>
                0 1 0 1<br>
                1 0 1 0<br>
                0 1 0 1<br>
                1 0 1 0
            </p>
            <textarea id="matrixInput" placeholder="Введите матрицу..."></textarea>
            <div class="modal-buttons">
                <button onclick="closeModal()" style="background: #6c7086;">Отмена</button>
                <button onclick="submitMatrix()" class="success">Построить граф</button>
            </div>
        </div>
    </div>

    <script>
        class InfiniteGraphCanvas {
            constructor() {
                this.canvas = document.getElementById('graphCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.container = document.getElementById('canvas-container');
                
                this.minimapCanvas = document.getElementById('minimapCanvas');
                this.minimapCtx = this.minimapCanvas.getContext('2d');
                
                // Параметры камеры
                this.camera = {
                    x: 0,
                    y: 0,
                    zoom: 1
                };
                
                // Целевые параметры для плавной анимации
                this.targetCamera = {
                    x: 0,
                    y: 0,
                    zoom: 1
                };
                
                // Состояния мыши
                this.mouse = {
                    x: 0,
                    y: 0,
                    worldX: 0,
                    worldY: 0,
                    isDragging: false,
                    dragStartX: 0,
                    dragStartY: 0,
                    isPanning: false,
                    panStartX: 0,
                    panStartY: 0,
                    cameraStartX: 0,
                    cameraStartY: 0
                };
                
                // Данные графа
                this.currentGraphData = null;
                this.currentMatrix = null;
                
                // Анимация
                this.animationId = null;
                this.gridSize = 50;
                
                // Выделение для алгоритмов
                this.highlightedVertices = [];
                this.highlightedPath = [];
                
                this.init();
            }
            
            init() {
                this.resizeCanvas();
                this.setupEventListeners();
                this.animate();
            }
            
            resizeCanvas() {
                const rect = this.container.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;
                this.minimapCanvas.width = 200;
                this.minimapCanvas.height = 150;
            }
            
            setupEventListeners() {
                window.addEventListener('resize', () => this.resizeCanvas());
                
                this.canvas.addEventListener('mousedown', (e) => this.onMouseDown(e));
                window.addEventListener('mousemove', (e) => this.onMouseMove(e));
                window.addEventListener('mouseup', (e) => this.onMouseUp(e));
                this.canvas.addEventListener('wheel', (e) => this.onWheel(e));
                this.canvas.addEventListener('contextmenu', (e) => e.preventDefault());
            }
            
            screenToWorld(screenX, screenY) {
                const rect = this.canvas.getBoundingClientRect();
                return {
                    x: (screenX - rect.left - this.camera.x) / this.camera.zoom,
                    y: (screenY - rect.top - this.camera.y) / this.camera.zoom
                };
            }
            
            worldToScreen(worldX, worldY) {
                const rect = this.canvas.getBoundingClientRect();
                return {
                    x: worldX * this.camera.zoom + this.camera.x + rect.left,
                    y: worldY * this.camera.zoom + this.camera.y + rect.top
                };
            }
            
            onMouseDown(e) {
                if (e.target !== this.canvas) return;
                
                const worldPos = this.screenToWorld(e.clientX, e.clientY);
                this.mouse.worldX = worldPos.x;
                this.mouse.worldY = worldPos.y;
                
                // Начинаем панорамирование
                this.mouse.isPanning = true;
                this.mouse.panStartX = e.clientX;
                this.mouse.panStartY = e.clientY;
                this.mouse.cameraStartX = this.targetCamera.x;
                this.mouse.cameraStartY = this.targetCamera.y;
                this.container.classList.add('grabbing');
            }
            
            onMouseMove(e) {
                const worldPos = this.screenToWorld(e.clientX, e.clientY);
                this.mouse.worldX = worldPos.x;
                this.mouse.worldY = worldPos.y;
                
                // Обновление координат в UI
                document.getElementById('coordinates').textContent = 
                    `X: ${Math.round(worldPos.x)}, Y: ${Math.round(worldPos.y)} | Масштаб: ${Math.round(this.camera.zoom * 100)}%`;
                
                if (this.mouse.isPanning) {
                    const dx = e.clientX - this.mouse.panStartX;
                    const dy = e.clientY - this.mouse.panStartY;
                    this.targetCamera.x = this.mouse.cameraStartX + dx;
                    this.targetCamera.y = this.mouse.cameraStartY + dy;
                }
            }
            
            onMouseUp(e) {
                this.mouse.isPanning = false;
                this.container.classList.remove('grabbing');
            }
            
            onWheel(e) {
                e.preventDefault();
                
                const rect = this.canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                
                const zoomFactor = 1.1;
                const oldZoom = this.targetCamera.zoom;
                
                if (e.deltaY < 0) {
                    this.targetCamera.zoom *= zoomFactor;
                } else {
                    this.targetCamera.zoom /= zoomFactor;
                }
                
                // Ограничение зума
                this.targetCamera.zoom = Math.min(Math.max(0.1, this.targetCamera.zoom), 5);
                
                // Сохраняем позицию мыши при зуме
                const zoomChange = this.targetCamera.zoom / oldZoom;
                this.targetCamera.x = mouseX - (mouseX - this.targetCamera.x) * zoomChange;
                this.targetCamera.y = mouseY - (mouseY - this.targetCamera.y) * zoomChange;
            }
            
            setGraphData(graphData) {
                this.currentGraphData = graphData;
                this.highlightedVertices = [];
                this.highlightedPath = [];
                this.resetView();
            }
            
            resetView() {
                const rect = this.container.getBoundingClientRect();
                this.targetCamera.x = rect.width / 2;
                this.targetCamera.y = rect.height / 2;
                this.targetCamera.zoom = 1;
            }
            
            // Отрисовка
            draw() {
                // Плавное движение камеры
                this.camera.x += (this.targetCamera.x - this.camera.x) * 0.1;
                this.camera.y += (this.targetCamera.y - this.camera.y) * 0.1;
                this.camera.zoom += (this.targetCamera.zoom - this.camera.zoom) * 0.1;
                
                // Очистка
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.ctx.fillStyle = '#1a1a2e';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                this.ctx.save();
                this.ctx.translate(this.camera.x, this.camera.y);
                this.ctx.scale(this.camera.zoom, this.camera.zoom);
                
                // Отрисовка сетки
                this.drawGrid();
                
                // Отрисовка графа
                if (this.currentGraphData) {
                    this.drawEdges();
                    this.drawNodes();
                }
                
                this.ctx.restore();
                
                // Отрисовка миникарты
                if (this.currentGraphData) {
                    this.drawMinimap();
                }
            }
            
            drawGrid() {
                const gridSize = this.gridSize;
                const width = this.canvas.width / this.camera.zoom;
                const height = this.canvas.height / this.camera.zoom;
                
                const startX = Math.floor(-this.camera.x / this.camera.zoom / gridSize) * gridSize;
                const startY = Math.floor(-this.camera.y / this.camera.zoom / gridSize) * gridSize;
                const endX = startX + width + gridSize * 2;
                const endY = startY + height + gridSize * 2;
                
                this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
                this.ctx.lineWidth = 1;
                
                for (let x = startX; x <= endX; x += gridSize) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x, startY);
                    this.ctx.lineTo(x, endY);
                    this.ctx.stroke();
                }
                
                for (let y = startY; y <= endY; y += gridSize) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(startX, y);
                    this.ctx.lineTo(endX, y);
                    this.ctx.stroke();
                }
                
                // Оси координат
                this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                this.ctx.lineWidth = 2;
                
                this.ctx.beginPath();
                this.ctx.moveTo(startX, 0);
                this.ctx.lineTo(endX, 0);
                this.ctx.stroke();
                
                this.ctx.beginPath();
                this.ctx.moveTo(0, startY);
                this.ctx.lineTo(0, endY);
                this.ctx.stroke();
            }
            
            drawEdges() {
                if (!this.currentGraphData) return;
                
                const { edges, vertices } = this.currentGraphData;
                
                // Обычные ребра
                this.ctx.strokeStyle = 'rgba(137, 180, 250, 0.5)';
                this.ctx.lineWidth = 2;
                
                edges.forEach(edge => {
                    const from = vertices[edge.from];
                    const to = vertices[edge.to];
                    if (!from || !to) return;
                    
                    // Проверяем, входит ли ребро в выделенный путь
                    const isPathEdge = this.isEdgeInPath(edge.from, edge.to);
                    
                    this.ctx.strokeStyle = isPathEdge ? '#f38ba8' : 'rgba(137, 180, 250, 0.5)';
                    this.ctx.lineWidth = isPathEdge ? 4 : 2;
                    
                    this.ctx.beginPath();
                    this.ctx.moveTo(from.x, from.y);
                    this.ctx.lineTo(to.x, to.y);
                    this.ctx.stroke();
                    
                    // Вес ребра
                    if (edge.weight !== 1) {
                        const midX = (from.x + to.x) / 2;
                        const midY = (from.y + to.y) / 2;
                        
                        this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                        const text = edge.weight.toFixed(1);
                        const textWidth = this.ctx.measureText(text).width;
                        this.ctx.fillRect(midX - textWidth / 2 - 5, midY - 10, textWidth + 10, 20);
                        
                        this.ctx.fillStyle = '#f9e2af';
                        this.ctx.font = '14px Arial';
                        this.ctx.textAlign = 'center';
                        this.ctx.fillText(text, midX, midY + 5);
                    }
                });
            }
            
            drawNodes() {
                if (!this.currentGraphData) return;
                
                const { vertices } = this.currentGraphData;
                
                vertices.forEach((v, index) => {
                    if (!v) return;
                    
                    const isHighlighted = this.highlightedVertices.includes(index);
                    const isInPath = this.highlightedPath.includes(index);
                    
                    // Тень
                    this.ctx.shadowColor = isHighlighted ? 'rgba(249, 226, 175, 0.8)' : 
                                          isInPath ? 'rgba(243, 139, 168, 0.8)' : 
                                          'rgba(0, 0, 0, 0.3)';
                    this.ctx.shadowBlur = isHighlighted || isInPath ? 15 : 10;
                    
                    // Круг вершины
                    this.ctx.beginPath();
                    this.ctx.arc(v.x, v.y, 25, 0, Math.PI * 2);
                    this.ctx.fillStyle = isHighlighted ? '#f9e2af' : 
                                        isInPath ? '#f38ba8' : 
                                        '#89b4fa';
                    this.ctx.fill();
                    
                    // Обводка
                    this.ctx.strokeStyle = 'white';
                    this.ctx.lineWidth = (isHighlighted || isInPath) ? 4 : 2;
                    this.ctx.stroke();
                    
                    this.ctx.shadowColor = 'transparent';
                    this.ctx.shadowBlur = 0;
                    
                    // Номер вершины
                    this.ctx.fillStyle = '#1e1e2e';
                    this.ctx.font = 'bold 16px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    this.ctx.fillText(index, v.x, v.y);
                });
            }
            
            drawMinimap() {
                this.minimapCtx.clearRect(0, 0, 200, 150);
                this.minimapCtx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                this.minimapCtx.fillRect(0, 0, 200, 150);
                
                const { vertices, edges } = this.currentGraphData;
                
                // Находим границы графа
                let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                vertices.forEach(v => {
                    if (v) {
                        minX = Math.min(minX, v.x);
                        minY = Math.min(minY, v.y);
                        maxX = Math.max(maxX, v.x);
                        maxY = Math.max(maxY, v.y);
                    }
                });
                
                const graphWidth = maxX - minX + 100;
                const graphHeight = maxY - minY + 100;
                const scale = Math.min(180 / graphWidth, 130 / graphHeight);
                const offsetX = 100 - (minX + maxX) / 2 * scale;
                const offsetY = 75 - (minY + maxY) / 2 * scale;
                
                // Вершины
                vertices.forEach(v => {
                    if (!v) return;
                    this.minimapCtx.fillStyle = '#89b4fa';
                    this.minimapCtx.beginPath();
                    this.minimapCtx.arc(v.x * scale + offsetX, v.y * scale + offsetY, 2, 0, Math.PI * 2);
                    this.minimapCtx.fill();
                });
                
                // Видимая область
                const viewX = -this.camera.x / this.camera.zoom * scale + offsetX;
                const viewY = -this.camera.y / this.camera.zoom * scale + offsetY;
                const viewW = this.canvas.width / this.camera.zoom * scale;
                const viewH = this.canvas.height / this.camera.zoom * scale;
                
                this.minimapCtx.strokeStyle = '#667eea';
                this.minimapCtx.lineWidth = 2;
                this.minimapCtx.strokeRect(viewX, viewY, viewW, viewH);
            }
            
            isEdgeInPath(from, to) {
                for (let i = 0; i < this.highlightedPath.length - 1; i++) {
                    if ((this.highlightedPath[i] === from && this.highlightedPath[i + 1] === to) ||
                        (this.highlightedPath[i] === to && this.highlightedPath[i + 1] === from)) {
                        return true;
                    }
                }
                return false;
            }
            
            highlightVertices(vertices, color = '#f9e2af') {
                this.highlightedVertices = vertices;
                this.highlightedPath = [];
            }
            
            highlightPath(path) {
                this.highlightedPath = path;
                this.highlightedVertices = [];
            }
            
            clearHighlights() {
                this.highlightedVertices = [];
                this.highlightedPath = [];
            }
            
            animate() {
                this.draw();
                this.animationId = requestAnimationFrame(() => this.animate());
            }
        }
        
        // Создаем экземпляр
        const graphCanvas = new InfiniteGraphCanvas();
        
        // Функции для работы с графом
        function showManualInput() {
            document.getElementById('inputModal').style.display = 'flex';
            document.getElementById('matrixInput').focus();
        }
        
        function closeModal() {
            document.getElementById('inputModal').style.display = 'none';
        }
        
        document.getElementById('inputModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        
        async function loadFromFile() {
            try {
                showStatus('Открытие файла...');
                const result = await window.electron.openFile();
                if (result) {
                    document.getElementById('matrixInput').value = result.content;
                    parseAndBuildGraph(result.content);
                }
            } catch (e) {
                showStatus('Ошибка: ' + e.message, true);
            }
        }
        
        function parseAndBuildGraph(content) {
            try {
                const lines = content.trim().split('\n');
                const matrix = [];
                
                for (let line of lines) {
                    line = line.trim();
                    if (line) {
                        const row = line.split(/\s+/).map(Number);
                        if (row.some(isNaN)) throw new Error('Все значения должны быть числами');
                        matrix.push(row);
                    }
                }
                
                const n = matrix.length;
                for (let i = 0; i < n; i++) {
                    if (matrix[i].length !== n) throw new Error('Матрица должна быть квадратной');
                }
                
                currentMatrix = matrix;
                buildGraph(matrix);
                
            } catch (e) {
                showStatus('Ошибка: ' + e.message, true);
            }
        }
        
        async function submitMatrix() {
            const input = document.getElementById('matrixInput').value;
            if (input.trim()) {
                parseAndBuildGraph(input);
                closeModal();
            }
        }
        
        async function buildGraph(matrix) {
            try {
                showStatus('Построение графа...');
                const graphData = await window.cpp.buildGraph(matrix);
                currentGraphData = graphData;
                currentMatrix = matrix;
                graphCanvas.setGraphData(graphData);
                showStatus(`Граф: ${graphData.numVertices} вершин, ${graphData.edges.length} рёбер`);
            } catch (e) {
                showStatus('Ошибка: ' + e.message, true);
            }
        }
        
        async function runBFS() {
            if (!currentGraphData) return showStatus('Сначала постройте граф', true);
            const startVertex = parseInt(document.getElementById('bfsStart').value);
            
            try {
                const result = await window.cpp.runBFS(startVertex);
                showAlgorithmResult('BFS обход: ' + result.join(' → '));
                graphCanvas.highlightVertices(result);
            } catch (e) {
                showStatus('Ошибка BFS: ' + e.message, true);
            }
        }
        
        async function runDFS() {
            if (!currentGraphData) return showStatus('Сначала постройте граф', true);
            const startVertex = parseInt(document.getElementById('dfsStart').value);
            
            try {
                const result = await window.cpp.runDFS(startVertex);
                showAlgorithmResult('DFS обход: ' + result.join(' → '));
                graphCanvas.highlightVertices(result);
            } catch (e) {
                showStatus('Ошибка DFS: ' + e.message, true);
            }
        }
        
        async function findPath() {
            if (!currentGraphData) return showStatus('Сначала постройте граф', true);
            const start = parseInt(document.getElementById('pathStart').value);
            const end = parseInt(document.getElementById('pathEnd').value);
            
            try {
                const path = await window.cpp.findShortestPath(start, end);
                if (path.length > 0) {
                    showAlgorithmResult(`Кратчайший путь ${start}→${end}: ${path.join(' → ')}`);
                    graphCanvas.highlightPath(path);
                } else {
                    showAlgorithmResult('Путь не найден');
                    graphCanvas.clearHighlights();
                }
            } catch (e) {
                showStatus('Ошибка: ' + e.message, true);
            }
        }
        
        async function checkConnectivity() {
            if (!currentGraphData) return showStatus('Сначала постройте граф', true);
            
            try {
                const connected = await window.cpp.checkConnectivity();
                showAlgorithmResult(connected ? 'Граф связный' : 'Граф не связный');
            } catch (e) {
                showStatus('Ошибка: ' + e.message, true);
            }
        }
        
        function clearGraph() {
            currentGraphData = null;
            currentMatrix = null;
            graphCanvas.setGraphData(null);
            document.getElementById('matrixInput').value = '';
            document.getElementById('algorithmResult').style.display = 'none';
            showStatus('Граф очищен');
        }
        
        function showAlgorithmResult(message) {
            const resultDiv = document.getElementById('algorithmResult');
            resultDiv.style.display = 'block';
            resultDiv.textContent = message;
        }
        
        function showStatus(message, isError = false) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.style.color = isError ? '#f38ba8' : '#a6e3a1';
        }
        
        // Инициализация
        showStatus('Готов к работе. Используйте мышь для навигации по холсту');
    </script>
</body>
</html>
